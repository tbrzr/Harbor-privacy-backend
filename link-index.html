<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harbor Privacy</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harbor Links">
<meta name="theme-color" content="#00e5c0">
<link rel="apple-touch-icon" sizes="180x180" href="https://harborprivacy.com/favicon-180.png">
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0e0f;color:#e8f0ef;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 24px 80px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(#1e2a2d 1px,transparent 1px),linear-gradient(90deg,#1e2a2d 1px,transparent 1px);background-size:60px 60px;opacity:0.3;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:500px;background:radial-gradient(ellipse,#00e5c015 0%,transparent 70%);pointer-events:none;z-index:0;}
.wrap{max-width:480px;width:100%;position:relative;z-index:1;}
.profile{text-align:center;margin-bottom:40px;}
.logo{width:80px;height:80px;margin:0 auto 16px;display:block;border-radius:20px;}
.name{font-family:'DM Mono',monospace;font-size:18px;color:#00e5c0;letter-spacing:0.1em;margin-bottom:6px;}
.tagline{font-family:'DM Mono',monospace;font-size:11px;color:#6b8a87;letter-spacing:0.1em;}
.links{display:flex;flex-direction:column;gap:10px;margin-bottom:40px;}
.link-btn{display:flex;align-items:center;padding:16px 20px;background:#111618;border:1px solid #1e2a2d;color:#e8f0ef;text-decoration:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:400;transition:all 0.2s;gap:14px;}
.link-btn:hover{background:#1a2224;border-color:#00e5c0;color:#00e5c0;}
.link-btn.featured{background:rgba(0,229,192,0.08);border-color:#00e5c0;color:#00e5c0;}
.link-btn img.favicon{width:20px;height:20px;border-radius:4px;flex-shrink:0;object-fit:contain;}
.link-btn .label{flex:1;}
.link-btn .arrow{font-family:'DM Mono',monospace;font-size:12px;color:#6b8a87;flex-shrink:0;}
.link-btn:hover .arrow{color:#00e5c0;}
.footer{text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:#2a3a3d;margin-top:auto;padding-top:32px;}
.footer a{color:#2a3a3d;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="profile">
    <img src="https://harborprivacy.com/favicon-180.png" class="logo" alt="Harbor Privacy">
    <div class="name">harbor/privacy</div>
    <div class="tagline">Private by design · Works anywhere</div>
  </div>
  <div class="links">
    <a href="https://harborprivacy.com/dns-checker" class="link-btn featured">
      <img src="https://www.google.com/s2/favicons?domain=harborprivacy.com&sz=32" class="favicon" alt="" onerror="this.style.display='none'">
      <span class="label">Is Your ISP Watching You? Free Check</span>
      <span class="arrow">&#8594;</span>
    </a>
    <a href="https://harborprivacy.com/pricing" class="link-btn ">
      <img src="https://www.google.com/s2/favicons?domain=harborprivacy.com&sz=32" class="favicon" alt="" onerror="this.style.display='none'">
      <span class="label">See Plans — from $1.99/mo</span>
      <span class="arrow">&#8594;</span>
    </a>
    <a href="https://harborprivacy.com/#contact" class="link-btn ">
      <img src="https://www.google.com/s2/favicons?domain=harborprivacy.com&sz=32" class="favicon" alt="" onerror="this.style.display='none'">
      <span class="label">Book an On-Site Install</span>
      <span class="arrow">&#8594;</span>
    </a>
    <a href="https://dashboard.harborprivacy.com" class="link-btn ">
      <img src="https://www.google.com/s2/favicons?domain=dashboard.harborprivacy.com&sz=32" class="favicon" alt="" onerror="this.style.display='none'">
      <span class="label">My Dashboard</span>
      <span class="arrow">&#8594;</span>
    </a>
    <a href="https://harborprivacy.com/how-it-works" class="link-btn ">
      <img src="https://www.google.com/s2/favicons?domain=harborprivacy.com&sz=32" class="favicon" alt="" onerror="this.style.display='none'">
      <span class="label">How It Works</span>
      <span class="arrow">&#8594;</span>
    </a>
    <a href="https://harborprivacy.com/nologs" class="link-btn ">
      <img src="https://www.google.com/s2/favicons?domain=harborprivacy.com&sz=32" class="favicon" alt="" onerror="this.style.display='none'">
      <span class="label">No-Logs Policy</span>
      <span class="arrow">&#8594;</span>
    </a>
    <a href="https://harborprivacy.com/#contact" class="link-btn ">
      <img src="https://www.google.com/s2/favicons?domain=harborprivacy.com&sz=32" class="favicon" alt="" onerror="this.style.display='none'">
      <span class="label">Get In Touch</span>
      <span class="arrow">&#8594;</span>
    </a>
  </div>
  <div class="footer">
    <a href="https://harborprivacy.com">harborprivacy.com</a> &middot; Pembroke, MA
  </div>
</div>
</body>
</html>
