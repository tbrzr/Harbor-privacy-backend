server {
    listen 80;
    listen 443 ssl;
    server_name network.brazer.us;
    ssl_certificate /etc/letsencrypt/live/harborprivacy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/harborprivacy.com/privkey.pem;
    return 301 https://harborprivacy.com$request_uri;
}

server {
    listen 80;
    server_name harborprivacy.com www.harborprivacy.com doh.harborprivacy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name harborprivacy.com www.harborprivacy.com;
    ssl_certificate /etc/letsencrypt/live/harborprivacy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/harborprivacy.com/privkey.pem;
    root /var/www/network;
    index index.html;
    charset utf-8;
    location = /free-trial {
        return 301 https://harborprivacy.com/parental-control;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
    location ~ /\.git {
        deny all;
        return 404;
    }
    location /webhook {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /dns-whoami/ {
        proxy_pass http://127.0.0.1:7000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/dns-analytics {
        proxy_pass http://127.0.0.1:7000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /dns-check {
        proxy_pass http://127.0.0.1:7000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: https://*.whoami.harborprivacy.com https://www.google.com;";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";
    server_tokens off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;
    autoindex off;
}

server {
    listen 443 ssl;
    server_name doh.harborprivacy.com;
    ssl_certificate /etc/letsencrypt/live/doh.harborprivacy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doh.harborprivacy.com/privkey.pem;
    location /dns-query {
        proxy_pass https://127.0.0.1:5443;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
    }
}

server {
    listen 443 ssl;
    server_name dashboard.harborprivacy.com;
    ssl_certificate /etc/letsencrypt/live/dashboard.harborprivacy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.harborprivacy.com/privkey.pem;
    location = /free-trial {
        return 301 https://harborprivacy.com/parental-control;
    }

    location / {
        proxy_pass http://127.0.0.1:7000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}


server {
    listen 80;
    server_name link.harborprivacy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name link.harborprivacy.com;
    ssl_certificate /etc/letsencrypt/live/link.harborprivacy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/link.harborprivacy.com/privkey.pem;
    root /var/www/link;
    index index.html;
    charset utf-8;
    location = /free-trial {
        return 301 https://harborprivacy.com/parental-control;
