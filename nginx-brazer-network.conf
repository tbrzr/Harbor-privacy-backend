}

server {
    listen 80;
    server_name test.harborprivacy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name test.harborprivacy.com;
    ssl_certificate /etc/letsencrypt/live/test.harborprivacy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.harborprivacy.com/privkey.pem;
    root /var/www/staging;
    index index.html;
    charset utf-8;

    auth_basic "Harbor Staging";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location = /free-trial {
        return 301 https://harborprivacy.com/parental-control;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
    location ~ /\.git {
        deny all;
        return 404;
    }
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-Robots-Tag "noindex, nofollow";
    server_tokens off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;
    autoindex off;
}

